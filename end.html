<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Верификация</title>
    
    <!-- Подключаем Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- СТРАНИЦА 3: ОСНОВНОЙ КОНТЕНТ -->
        <div class="page" id="mainPage">
            <div class="container">
                <div class="header">
                    <div class="icon-big">🎉</div>
                    <h1>Добро пожаловать!</h1>
                    <p class="subtitle">Вы успешно прошли верификацию</p>
                </div>
                
                <div class="user-info">
                    <div class="avatar" id="avatar"></div>
                    <div class="user-name" id="userName">Загрузка...</div>
                    <div class="user-status" id="userStatus">✅ Верифицирован</div>
                </div>
                
                <div class="welcome-card">
                    <p id="welcomeText">
                        Рады видеть тебя в нашем чате! 🎉
                    </p>
                </div>
                
                <button class="btn btn-secondary" id="logoutBtn">
                    🚪 Выйти
                </button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
