<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Верификация</title>
    
    <!-- Подключаем Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- СТРАНИЦА 1: ПРАВИЛАааа -->
        <div class="page active" id="rulesPage">
            <div class="container">
                <div class="header">
                    <div class="icon-big">📋</div>
                    <h1>Правила чата</h1>
                    <p class="subtitle">Пожалуйста, ознакомьтесь с правилами перед входом</p>
                </div>
                
                <div class="rules-list" id="rulesList">
                    <!-- Правила будут добавлены через JS -->
                </div>
                    <button class="btn btn-primary btn-bottom" id="agreeBtn" disabled>
                        📖 Я прочитал(а), я согласен(на)
                    </button>
                <div class="scroll-hint" id="scrollHint">⬇️ Прокрутите до конца ⬇️</div>
            </div>
        </div>
    </div>
    
    <script src="rules.js"></script>
</body>
</html>
